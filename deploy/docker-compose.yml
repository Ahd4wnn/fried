# Hovio app layer: Caddy (TLS + routing) + FastAPI backend.
# The Supabase stack (../supabase) must be up first — this attaches to its
# Docker network so Caddy and the backend can reach Kong directly.
name: hovio

services:
  caddy:
    image: caddy:2-alpine
    container_name: hovio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - supabase
      - default

  backend:
    build: ../backend
    container_name: hovio-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      # Talk to Kong directly over the Docker network
      SUPABASE_URL: http://kong:8000
      FRONTEND_ORIGIN: https://hovio.org
      APP_ENV: production
    networks:
      - supabase
      - default

  # Self-hosted LiveKit for live human sessions (video/audio/chat).
  # Signalling is reverse-proxied by Caddy at wss://hovio.org/livekit; media
  # flows over the published RTC ports. API keys come from backend/.env via
  # deploy.sh (exported as LIVEKIT_API_KEY / LIVEKIT_API_SECRET).
  livekit:
    image: livekit/livekit-server:v1.9
    container_name: hovio-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret_devsecret_devsecret_00}"
    ports:
      - "7881:7881"                     # WebRTC over TCP (fallback)
      - "50000-50200:50000-50200/udp"   # WebRTC media
    networks:
      - default

networks:
  supabase:
    external: true
    name: supabase_default

volumes:
  caddy_data:
  caddy_config:
